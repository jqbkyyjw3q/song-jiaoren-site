<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-labelledby="title desc">
<title id="title">1911—1913 时间轴</title>
<desc id="desc">辛亥革命到宋教仁案及二次革命的时间轴示意图</desc>

<style>
  .bg { fill: #fffdfa; stroke: rgba(0,0,0,0.08); stroke-width: 1; }
  .soft { fill: #f2eee6; stroke: rgba(0,0,0,0.08); stroke-width: 1; }
  .accent { fill: #c46a4a; }
  .text { fill: #1d1c19; font-family: Inter, Arial, sans-serif; }
  .muted { fill: #5f5a54; font-family: Inter, Arial, sans-serif; }
  .serif { fill: #1d1c19; font-family: 'Noto Serif SC', serif; }
  .line { stroke: #cdbfb1; stroke-width: 2; }
  .line-strong { stroke: #c46a4a; stroke-width: 3; }
  .dash { stroke: #9e9489; stroke-width: 2; stroke-dasharray: 6 6; }
</style>

<rect x="0" y="0" width="1200" height="420" fill="#f7f4ee"/>
<text x="60" y="58" class="serif" font-size="30" font-weight="600">1911—1913：从共和曙光到制度危机</text>
<text x="60" y="88" class="muted" font-size="16">这条时间轴不是单纯列事件，而是显示“制度化机会”如何一步步转入政治危机。</text>
<line x1="90" y1="220" x2="1110" y2="220" class="line"/>
<circle cx="130" cy="220" r="11" class="accent"/><circle cx="310" cy="220" r="11" class="accent"/><circle cx="500" cy="220" r="11" class="accent"/><circle cx="700" cy="220" r="11" class="accent"/><circle cx="885" cy="220" r="11" class="accent"/><circle cx="1060" cy="220" r="11" class="accent"/>
<line x1="700" y1="220" x2="885" y2="220" class="line-strong"/>
<rect x="60" y="118" rx="18" ry="18" width="160" height="72" class="bg"/>
<text x="80" y="147" class="text" font-size="14" font-weight="700">1911.10</text><text x="80" y="170" class="serif" font-size="18">辛亥革命</text>
<rect x="240" y="248" rx="18" ry="18" width="170" height="82" class="bg"/>
<text x="260" y="278" class="text" font-size="14" font-weight="700">1912.1—3</text><text x="260" y="301" class="serif" font-size="18">民国建立</text><text x="260" y="321" class="muted" font-size="14">《临时约法》出台</text>
<rect x="430" y="118" rx="18" ry="18" width="165" height="72" class="bg"/>
<text x="450" y="147" class="text" font-size="14" font-weight="700">1912.8</text><text x="450" y="170" class="serif" font-size="18">国民党组建</text>
<rect x="620" y="248" rx="18" ry="18" width="165" height="82" class="soft"/>
<text x="640" y="278" class="text" font-size="14" font-weight="700">1913 初</text><text x="640" y="301" class="serif" font-size="18">选举胜利</text><text x="640" y="321" class="muted" font-size="14">多数党组阁出现可能</text>
<rect x="805" y="118" rx="18" ry="18" width="160" height="72" class="soft"/>
<text x="825" y="147" class="text" font-size="14" font-weight="700">1913.3.20—22</text><text x="825" y="170" class="serif" font-size="18">宋教仁遇刺</text>
<rect x="980" y="248" rx="18" ry="18" width="160" height="82" class="bg"/>
<text x="1000" y="278" class="text" font-size="14" font-weight="700">1913 夏</text><text x="1000" y="301" class="serif" font-size="18">二次革命</text><text x="1000" y="321" class="muted" font-size="14">政治更快转向武力对抗</text>
<text x="805" y="358" class="muted" font-size="14">高亮段表示：制度化机会最接近现实、也最脆弱的时段</text>
</svg>